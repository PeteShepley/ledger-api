name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip deployment package
        run: cd dist && zip -r ../function.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Applied against the Data API before the code that depends on it
      # goes live — same reasoning as running Django/Rails migrations
      # ahead of a code deploy. infra/apis/ledger-api's Terraform owns the
      # cluster/secret; this only ever runs `drizzle-kit migrate`.
      - name: Run database migrations
        run: npm run db:migrate
        env:
          RESOURCE_ARN: ${{ vars.RESOURCE_ARN }}
          SECRET_ARN: ${{ vars.SECRET_ARN }}
          DATABASE_NAME: ${{ vars.DATABASE_NAME }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://function.zip

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "${{ vars.LAMBDA_FUNCTION_NAME }}"
